name: Build and Release

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - ".github/workflows/release.yml"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run Go tests
        run: go test ./...

      - name: Build frontend
        run: npm run build

      - name: Trivy scan (source code)
        uses: aquasecurity/trivy-action@0.34.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          scan-type: fs
          scan-ref: .
          skip-files: .github/workflows/release.yml,**/*.md,Dockerfile.dev,**/Dockerfile.dev
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          scanners: vuln,secret,misconfig
          vuln-type: os,library

      - name: Build binaries
        env:
          APP_NAME: aurora-ui-service
        run: |
          set -Eeuo pipefail
          mkdir -p release
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "release/${APP_NAME}_linux_amd64" ./cmd/server
          tar -C release -czf "release/${APP_NAME}_linux_amd64.tar.gz" "${APP_NAME}_linux_amd64"

      - name: Resolve release version
        id: version
        run: |
          set -Eeuo pipefail
          pkg_version="$(node -p \"require('./package.json').version || ''\")"
          pkg_version="$(printf '%s' "${pkg_version}" | tr -d '[:space:]')"
          if [ -n "${pkg_version}" ] && [ "${pkg_version}" != "0.0.0" ]; then
            version="v${pkg_version}"
          else
            ts="$(date -u +%Y%m%d%H%M%S)"
            seed="${ts}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_SHA}"
            rand="$(printf '%s' "${seed}" | shasum -a 256 | cut -c1-8)"
            version="v${ts}-${rand}-alpha"
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Build installer bundle
        env:
          APP_NAME: aurora-ui-service
          MODULE_NAME: aurora-ui
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -Eeuo pipefail
          bundle_root="release/bundle_amd64"
          rm -rf "${bundle_root}"
          mkdir -p "${bundle_root}/bin" "${bundle_root}/systemd" "${bundle_root}/nginx" "${bundle_root}/dist"
          install -m 0755 "release/${APP_NAME}_linux_amd64" "${bundle_root}/bin/${APP_NAME}"
          cp -R dist/. "${bundle_root}/dist/"
          install -m 0644 install/aurora-ui.service.tpl "${bundle_root}/systemd/aurora-ui.service.tpl"
          install -m 0644 install/nginx.conf.tpl "${bundle_root}/nginx/aurora-ui.conf.tpl"
          sed "s|__VERSION__|${VERSION}|g" install/manifest.json > "${bundle_root}/manifest.json"
          tar -C "${bundle_root}" -czf "release/${MODULE_NAME}_linux_amd64_bundle.tar.gz" .
          shasum -a 256 release/*.tar.gz > release/checksums.txt

      - name: Delete existing release/tag (overwrite mode)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail
          tag="${{ steps.version.outputs.value }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release delete "$tag" -y --cleanup-tag || true
          fi
          git push origin ":refs/tags/$tag" || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: Aurora UI ${{ steps.version.outputs.value }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release/*.tar.gz
            release/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
